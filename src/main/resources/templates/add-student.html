<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
  <title>Add Student</title>

  <style>

    body{
        font-family:Arial,sans-serif;
        background:#f4f6f9;
        display:flex;
        justify-content:center;
        align-items:center;
        height:100vh;
        margin:0;
    }

    .container{
        width:450px;
        background:white;
        padding:30px;
        border-radius:10px;
        box-shadow:0 4px 15px rgba(0,0,0,0.15);
    }

    h2{
        text-align:center;
        margin-bottom:25px;
    }

    label{
        font-weight:bold;
        display:block;
        margin-top:15px;
    }

    input,select{
        width:100%;
        padding:10px;
        margin-top:5px;
        border:1px solid #ccc;
        border-radius:5px;
        box-sizing:border-box;
    }

    button{
        width:100%;
        padding:12px;
        margin-top:25px;
        background:#2f5bea;
        color:white;
        border:none;
        border-radius:5px;
        cursor:pointer;
        font-size:16px;
    }

    button:hover{
        background:#2146d0;
    }

  </style>

</head>

<body>

<div class="container">

  <h2>Add Student</h2>

  <form th:action="@{/save-student}"
        th:object="${student}"
        method="post">

    <input type="hidden" th:field="*{id}">

    <label>Name</label>
    <input type="text" th:field="*{name}" required>

    <label>Email</label>
    <input type="email" th:field="*{email}" required>

    <label>Branch</label>
    <input type="text" th:field="*{branch}" required>

    <label>CGPA</label>
    <input type="number"
           step="0.01"
           th:field="*{cgpa}"
           required>

    <label>Placed</label>
    <select th:field="*{placed}">
      <option value="false">No</option>
      <option value="true">Yes</option>
    </select>

    <button type="submit">Save Student</button>

  </form>

</div>

</body>

</html>
