<!DOCTYPE html>
<html>

<head>

    <title>Campus Placement Tracker</title>

    <style>

        body{

        background-color:#f5f7fa;

        }

        .container{

        width:400px;

        margin:auto;

        margin-top:100px;

        background:white;

        padding:30px;

        border-radius:10px;

        box-shadow:0 4px 15px rgba(0,0,0,0.1);

        text-align:center;



        h1{

margin-bottom:10px;

color:#1f2937;

}

h2{

margin-bottom:25px;

color:#6b7280;

font-size:20px;

font-weight:500;

}


        label{

        display:block;

        text-align:left;

        font-weight:bold;

        }


       font-family:Arial,sans-serif;
       width:420px;
    }

        input{

        width:100%;

        padding:10px;

        margin-top:5px;

        margin-bottom:15px;

        box-sizing:border-box;

        border:1px solid #d1d5db;

        border-radius:5px;

        outline:none;

        }

        input:focus{

        border-color:#2563eb;

        box-shadow:0 0 5px rgba(37,99,235,0.4);

        }

        input::placeholder{

color:#9ca3af;

font-size:14px;

}

        button{

        background:#2563eb;

        color:white;

        padding:10px;

        border:none;

        border-radius:5px;

        cursor:pointer;

        width:100%;

        transition:0.3s;

        padding:12px;

        font-size:15px;

        font-weight:600;
        }

        button:hover{

        background:#1d4ed8;

}

    </style>

</head>

<body>

<div class="container">

    <h1>Campus Placement Tracker</h1>

    <h2>Login Page</h2>

    <form action="/login" method="POST">

        <label>Username</label>

        <input type="text"
               name="username"
               placeholder="Enter username">

        <br><br>

        <label>Password</label>

        <input type="password"
               name="password"
               placeholder="Enter password">

        <br><br>

        <button>

            Login

        </button>

    </form>

</div>

</body>

</html>
