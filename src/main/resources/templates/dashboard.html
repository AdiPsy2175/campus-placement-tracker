<!DOCTYPE html>
<html>

<head>

  <title>Dashboard</title>

  <style>

    body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: #f2f4f8;

        display: flex;
        justify-content: center;
        align-items: center;

        height: 100vh;
    }

    .container {
        width: 700px;
        background: white;
        padding: 40px;
        border-radius: 12px;
        box-shadow: 0 5px 15px rgba(0, 0, 0, 0.15);
    }

    .dashboard-cards{
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:20px;
    margin-top:30px;
}

   .card{
    flex:1;
    background:#f8f9fc;
    border-radius:10px;
    padding:15px;
    text-align:center;
    box-shadow:0 2px 8px rgba(0,0,0,0.1);
    min-height:120px;
}

    .card h3 {
        margin-bottom: 10px;
    }

    .card p {
        font-size: 28px;
        color: #2f5bea;
        font-weight: bold;
    }

  </style>

</head>

<body>

<div class="container">

  <h1>Campus Placement Tracker</h1>

  <h2>Dashboard</h2>

  <h3>
    Welcome,
    <span th:text="${username}"></span> 👋
  </h3>

  <hr>

  <div class="dashboard-cards">

    <div class="card">
      <h3>Total Students</h3>
      <p>250</p>
    </div>

    <div class="card">
      <h3>Total Companies</h3>
      <p>18</p>
    </div>

    <div class="card">
      <h3>Placed Students</h3>
      <p>150</p>
    </div>

    <div class="card">
      <h3>Upcoming Drives</h3>
      <p>5</p>
    </div>

  </div>

</div>

</body>

</html>
